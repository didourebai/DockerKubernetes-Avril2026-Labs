version: "3.9"

services:

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    configs:
      - source: nginx-config
        target: /etc/nginx/conf.d/default.conf
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
    networks:
      - reseau-portail

  app:
    image: it-portal:v5
    environment:
      - APP_ENV=production
      - APP_VERSION=5.0.0
    volumes:
      - portail-data:/app/data
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    networks:
      - reseau-portail

configs:
  nginx-config:
    file: ./nginx/nginx.conf

networks:
  reseau-portail:
    driver: overlay

volumes:
  portail-data:
