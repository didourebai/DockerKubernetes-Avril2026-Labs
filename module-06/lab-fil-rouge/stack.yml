# stack.yml — IT-Support Portal v5.0
# Module 06 : Déploiement Docker Swarm avec haute disponibilité

version: "3.9"

services:

  # ── Nginx : reverse proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - reseau-portal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
    depends_on:
      - app

  # ── Application Flask : 3 réplicas ─────────────────────────────────────
  app:
    image: it-portal:v5
    environment:
      - APP_ENV=production
      - APP_VERSION=5.0.0
      - DATABASE_URL=postgresql://it_admin:MotDePasseFormation123@db:5432/it_portal
    networks:
      - reseau-portal
    deploy:
      replicas: 3                    # 3 copies pour la haute disponibilité
      update_config:
        parallelism: 1               # Mettre à jour 1 réplica à la fois
        delay: 10s                   # Attendre 10s entre chaque mise à jour
        order: start-first           # Démarrer le nouveau avant d'arrêter l'ancien
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      - db

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=it_portal
      - POSTGRES_USER=it_admin
      - POSTGRES_PASSWORD=MotDePasseFormation123
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - reseau-portal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager     # La BDD tourne sur le nœud manager
      restart_policy:
        condition: on-failure

networks:
  reseau-portal:
    driver: overlay                  # Overlay : fonctionne sur plusieurs nœuds

volumes:
  db-data:
