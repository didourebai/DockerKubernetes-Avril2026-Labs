apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: it-support
data:
  default.conf: |
    server {
        listen 80;
        location / {
            proxy_pass http://it-portal-app-svc:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
