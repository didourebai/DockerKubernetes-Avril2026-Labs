apiVersion: apps/v1
kind: Deployment
metadata:
  name: it-portal-nginx
  namespace: it-support
spec:
  replicas: 2
  selector:
    matchLabels:
      app: it-portal-nginx
  template:
    metadata:
      labels:
        app: it-portal-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        resources:
          requests:
            memory: "16Mi"
            cpu: "25m"
          limits:
            memory: "32Mi"
            cpu: "50m"
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
