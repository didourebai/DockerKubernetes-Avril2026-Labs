---
# ConfigMap contenant la configuration Nginx
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: it-portal
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;

        location /static/ {
            # Fichiers statiques servis par Nginx
            root /usr/share/nginx/html;
            expires 7d;
        }

        location / {
            # Transmettre les requêtes au service Flask
            proxy_pass http://app-svc:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
---
# Deployment Nginx
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: it-portal
  labels:
    app: it-portal-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: it-portal-nginx
  template:
    metadata:
      labels:
        app: it-portal-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/conf.d
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nginx-conf
        configMap:
          name: nginx-config
