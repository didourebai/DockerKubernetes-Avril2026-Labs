apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  namespace: it-portal
  labels:
    app: it-portal-nginx
spec:
  # NodePort rend le service accessible depuis l'extérieur du cluster
  type: NodePort
  selector:
    app: it-portal-nginx
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080   # Accessible sur http://localhost:30080 avec kind
    name: http
