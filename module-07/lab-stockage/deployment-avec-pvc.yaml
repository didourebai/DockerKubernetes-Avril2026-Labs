# deployment-avec-pvc.yaml -- Deployment qui utilise le PVC
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portail-stockage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portail-stockage
  template:
    metadata:
      labels:
        app: portail-stockage
    spec:
      containers:
      - name: app
        image: alpine
        command: ["sh", "-c", "sleep 3600"]
        volumeMounts:
        - name: donnees
          mountPath: /app/data
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: donnees
        persistentVolumeClaim:
          claimName: pvc-donnees-portail
