---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "it-portal.labels" . | nindent 4 }}
    app: it-portal-app
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      app: it-portal-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: it-portal-app
        version: {{ .Values.app.version | quote }}
    spec:
      containers:
      - name: app
        image: "{{ .Values.app.image }}:{{ .Values.app.tag }}"
        imagePullPolicy: {{ .Values.app.imagePullPolicy }}
        ports:
        - containerPort: {{ .Values.app.port }}
        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: it-portal-config
              key: APP_ENV
        - name: APP_VERSION
          valueFrom:
            configMapKeyRef:
              name: it-portal-config
              key: APP_VERSION
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: it-portal-secret
              key: DATABASE_URL
        resources:
          {{- toYaml .Values.app.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.app.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.app.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: app-svc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "it-portal.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: it-portal-app
  ports:
  - port: {{ .Values.app.port }}
    targetPort: {{ .Values.app.port }}
