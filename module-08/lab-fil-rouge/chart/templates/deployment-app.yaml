apiVersion: apps/v1
kind: Deployment
metadata:
  name: it-portal-app
  namespace: {{ .Values.namespace }}
  labels:
    app: it-portal-app
    version: {{ .Values.app.version | quote }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: it-portal-app
  template:
    metadata:
      labels:
        app: it-portal-app
        version: {{ .Values.app.version | quote }}
    spec:
      containers:
      - name: app
        image: {{ .Values.app.image }}:{{ .Values.app.tag }}
        imagePullPolicy: {{ .Values.app.pullPolicy }}
        ports:
        - containerPort: {{ .Values.app.port }}
        envFrom:
        - configMapRef:
            name: it-portal-config
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.app.port }}
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.app.port }}
          initialDelaySeconds: 15
          periodSeconds: 20
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: portail-data-pvc
