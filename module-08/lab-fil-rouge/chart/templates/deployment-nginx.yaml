apiVersion: apps/v1
kind: Deployment
metadata:
  name: it-portal-nginx
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.nginx.replicas }}
  selector:
    matchLabels:
      app: it-portal-nginx
  template:
    metadata:
      labels:
        app: it-portal-nginx
    spec:
      containers:
      - name: nginx
        image: {{ .Values.nginx.image }}:{{ .Values.nginx.tag }}
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        resources:
          requests:
            memory: "16Mi"
            cpu: "25m"
          limits:
            memory: "32Mi"
            cpu: "50m"
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: it-portal-nginx-svc
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: it-portal-nginx
  ports:
  - port: 80
    targetPort: 80
    nodePort: {{ .Values.nginx.nodePort }}
---
apiVersion: v1
kind: Service
metadata:
  name: it-portal-app-svc
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: it-portal-app
  ports:
  - port: {{ .Values.app.port }}
    targetPort: {{ .Values.app.port }}
  type: ClusterIP
